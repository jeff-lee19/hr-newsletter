name: Generate Weekly Newsletter

on:
  schedule:
    - cron: "45 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate newsletter HTML
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -o pipefail
          python .github/scripts/generate_newsletter_v6.py 2>&1 | tee generator.log

      - name: Write failure summary
        if: failure()
        shell: bash
        run: |
          echo '## Generator failure log' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 generator.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push changes
        if: success()
        run: |
          if git diff --quiet; then
            echo "No newsletter changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hr_monday_newsletter.html
          git commit -m "Update weekly HR newsletter"
          git push
