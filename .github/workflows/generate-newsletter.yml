name: Generate Weekly Newsletter

on:
  schedule:
    - cron: "45 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate newsletter HTML
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python3 .github/scripts/generate_newsletter.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No newsletter changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hr_monday_newsletter.html
          git commit -m "Update weekly HR newsletter"
          git push
