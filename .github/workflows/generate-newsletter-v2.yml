name: Generate Weekly Newsletter v2

on:
  workflow_dispatch:
  schedule:
    - cron: "45 22 * * 0"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate newsletter HTML
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python .github/scripts/generate_newsletter_v2.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No newsletter changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hr_monday_newsletter.html
          git commit -m "Update weekly HR newsletter"
          git push
