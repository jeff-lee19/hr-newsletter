name: Notify Email

on:
  workflow_run:
    workflows: ["Deploy Newsletter Site"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Compute newsletter URL
        id: url
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"

          if [[ "${repo}" == "${owner}.github.io" ]]; then
            url="https://${owner}.github.io/"
          else
            url="https://${owner}.github.io/${repo}/"
          fi

          echo "value=${url}" >> "$GITHUB_OUTPUT"

      - name: Show source revision
        shell: bash
        run: |
          git rev-parse HEAD

      - name: Send newsletter email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEWSLETTER_URL: ${{ steps.url.outputs.value }}
        run: python3 .github/scripts/send_email.py
